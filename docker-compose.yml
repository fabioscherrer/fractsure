services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fracture-api
    ports:
      - "8000:8000"
    networks:
      - fracture-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fracture-frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - fracture-net

networks:
  fracture-net:
    driver: bridge
