services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fracture-api
    ports:
      - "8000:8000"
    networks:
      - fracture-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fracture-frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - fracture-net

networks:
  fracture-net:
    driver: bridge
